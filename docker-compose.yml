services:
  postgres:
    image: postgres:17
    container_name: bp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: faysal1997
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: bp-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - bp-mongo-data:/data/db
      - mongo_configdb:/data/configdb

  # Single-node Kafka, KRaft mode (no Zookeeper). Fine for local/dev; a real
  # deployment would run 3+ brokers and a replication factor > 1.
  kafka:
    image: apache/kafka:3.9.0
    container_name: bp-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:29092,CONTROLLER://:9093,PLAINTEXT_HOST://:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  # Pre-existing volumes from the containers this replaces — `external: true`
  # tells Compose to use them as-is rather than create new (empty) ones, so all
  # existing Postgres/Mongo data survives the switch to Compose untouched.
  postgres_data:
    external: true
  bp-mongo-data:
    external: true
  # New volumes — nothing to preserve for these.
  mongo_configdb:
  kafka_data:
